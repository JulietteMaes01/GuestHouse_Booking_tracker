name: Update Bookings & Schedule

on:
  schedule:
    - cron: '*/20 * * * *'   # every 20 minutes
  workflow_dispatch:           # also allows manual trigger from GitHub UI

permissions:
  contents: write              # needed to commit docs/ and processed_emails.json back

# Only one run at a time — if a new one is queued while one runs, cancel the waiting one
concurrency:
  group: update-bookings
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Decode Google credentials
        run: |
          mkdir -p $GITHUB_WORKSPACE/../creds
          echo "${{ secrets.GOOGLE_CREDENTIALS_B64 }}" | base64 -d > $GITHUB_WORKSPACE/../creds/credentials.json
          echo "${{ secrets.GOOGLE_TOKEN_B64 }}"       | base64 -d > $GITHUB_WORKSPACE/../creds/token.pickle

      - name: Sync emails → Google Sheet
        run: |
          cd scripts
          python email_parser.py

      - name: Generate schedule HTML
        run: |
          cd scripts
          python schedule_generator.py --no-git

      - name: Generate analytics dashboard
        run: |
          cd scripts
          python analytics.py

      - name: Commit and push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3; do
            git stash --include-untracked
            git pull --rebase origin main
            git stash pop
            git add docs/ scripts/processed_emails.json
            git diff --staged --quiet && echo "Nothing to commit" && exit 0
            git commit -m "Auto-update $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push && exit 0
            echo "Push failed (attempt $attempt/3), retrying in 5s…"
            git reset HEAD~1
            sleep 5
          done
          echo "All push attempts failed" && exit 1
